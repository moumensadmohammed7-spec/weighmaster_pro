workflows:
  bridge-app:
    name: Al-Jisr Al-Wazan Build
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest

    scripts:
      - name: Install dependencies
        script: flutter pub get

      - name: Analyze project
        script: flutter analyze

      - name: Build APK release
        script: flutter build apk --release

    artifacts:
      - build/**/outputs/**/*.apk

    publishing:
