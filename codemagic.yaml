workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60

    environment:
      flutter: stable
      java: 17

    scripts:
      - name: Clean project
        script: flutter clean

      - name: Get dependencies
        script: flutter pub get

      - name: Build APK
        script: flutter build apk --release

    artifacts:
      - build/**/outputs/**/*.apk
      
workflows:
  build-android:
    name: Build Android
    max_build_duration: 30
    environment:
      flutter: stable
    scripts:
      - flutter create .
      - flutter pub get
      - flutter build apk --release
    artifacts:
      - build/**/outputs/**/*.apk
