workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60

    environment:
      flutter: stable
      java: 17

    cache:
      cache_paths:
        - ~/.pub-cache

    scripts:
      - name: Install dependencies
        script: flutter pub get

      - name: Build APK
        script: flutter build apk --release

    artifacts:
      - build/**/outputs/**/*.apk
