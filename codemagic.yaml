workflows:
  android-build:
    name: Android Build (Flutter Fix)
    max_build_duration: 30

    environment:
      flutter: stable
      groups:
        - google_play
      vars:
        FLUTTER_VERSION: stable

    scripts:
      - name: Check Flutter
        script: flutter --version

      - name: Clean project
        script: flutter clean

      - name: Fix project structure (IMPORTANT)
        script: flutter create .

      - name: Get dependencies
        script: flutter pub get

      - name: Build APK
        script: flutter build apk --release

    artifacts:
      - build/**/outputs/**/*.apk
